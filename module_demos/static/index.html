<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>B1-B5 Agent Module Studio</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/metrics.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">A</span><div><strong>Agent Studio</strong><small>模块验收演示系统</small></div></div>
      <nav id="module-nav" aria-label="模块导航"></nav>
      <div class="system-state">
        <div class="online-state"><span></span><strong id="online-count">正在连接...</strong></div>
        <label for="participant-name">当前身份</label>
        <input id="participant-name" maxlength="32" autocomplete="off">
      </div>
    </aside>
    <main>
      <header class="topbar">
        <div><span class="eyebrow" id="owner"></span><h1 id="title">加载模块...</h1><p id="summary"></p></div>
        <div class="contract"><span id="input-contract"></span><b>→</b><span id="output-contract"></span></div>
      </header>

      <section class="handoff" aria-labelledby="handoff-title">
        <div class="section-heading"><div><span class="kicker">INTERFACE HANDOFF</span><h2 id="handoff-title">模块协作与接口流向</h2></div><code id="endpoint"></code></div>
        <div class="flow-grid">
          <div class="flow-step"><span>01 输入来源</span><strong id="input-from"></strong></div>
          <div class="flow-arrow">→</div>
          <div class="flow-step"><span>02 本模块生成</span><strong id="generated-output"></strong></div>
          <div class="flow-arrow">→</div>
          <div class="flow-step"><span>03 接收方</span><strong id="receiver"></strong></div>
        </div>
        <p class="integration-note" id="integration"></p>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head"><div><span class="kicker">LIVE INPUT</span><h2>模块输入</h2></div><span id="module-chip"></span></div>
          <div id="form"></div>
          <button id="run" type="button">运行当前模块</button>
        </div>
        <div class="panel output-panel">
          <div class="panel-head"><div><span class="kicker">STANDARD OUTPUT</span><h2>结构化输出</h2></div><span id="status">等待运行</span></div>
          <div id="metrics"></div>
          <pre id="output">运行后显示模块标准输出。</pre>
        </div>
      </section>
      <section class="result-insights" id="result-insights" hidden>
        <div class="section-heading"><div><span class="kicker">RUN METRICS</span><h2>本次调用结果参数</h2></div><span class="result-module" id="result-module"></span></div>
        <div class="parameter-row" id="parameter-row"></div>
        <div class="result-detail" id="result-detail" hidden></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
