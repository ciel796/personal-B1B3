default_toolset: basic_tools

settings:
  data_root: ../data

toolsets:
  basic_tools:
    - calculator
    - code_executor
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - read_convert_file
  advanced_tools:
    - calculator
    - file_reader
    - local_file_search
    - table_analyzer
    - format_converter
    - read_convert_file
    - code_executor

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: Calculate one safe arithmetic expression. Use code_executor instead for loops, prime numbers, sequences, algorithms, or multi-step calculations.
    parameters:
      expression:
        type: string
        description: Arithmetic expression using numbers and supported operators.
    required: [expression]
    returns:
      result:
        type: number
        description: Calculated value.

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: Read a local UTF-8 txt or md file from the data directory.
    parameters:
      path:
        type: string
        description: Path relative to the configured data root.
      max_chars:
        type: integer
        description: Maximum number of characters to return.
    required: [path]
    returns:
      content: {type: string, description: File content.}
      num_chars: {type: integer, description: Returned character count.}
      source: {type: string, description: Normalized path relative to data root.}
      truncated: {type: boolean, description: Whether content was truncated.}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: Search local text/code/data files under the configured data root and return ranked snippets.
    parameters:
      query: {type: string, description: Search query.}
      root_dir: {type: string, description: Directory relative to data root. Defaults to docs.}
      file_types:
        type: array
        items: {type: string}
        description: File extensions to search, such as txt, md, py, json, yaml, csv, tsv, or log.
      top_k: {type: integer, description: Maximum number of matches, between 1 and 20.}
      include_globs:
        type: array
        items: {type: string}
        description: Optional glob patterns relative to root_dir that must match.
      exclude_globs:
        type: array
        items: {type: string}
        description: Optional glob patterns relative to root_dir to skip.
      max_files: {type: integer, description: Maximum candidate files to scan, up to 1000.}
      max_file_bytes: {type: integer, description: Maximum bytes read from each file.}
      max_snippet_chars: {type: integer, description: Maximum snippet characters per result, up to 800.}
    required: [query]
    returns:
      query: {type: string, description: Original query.}
      root_dir: {type: string, description: Searched directory.}
      files_scanned: {type: integer, description: Candidate file count.}
      total_matches: {type: integer, description: Number of files with matches.}
      truncated_files: {type: integer, description: Number of files read only partially.}
      skipped_files: {type: integer, description: Number of unreadable or binary-like files skipped.}
      results: {type: array, description: Ranked paths, line numbers, snippets, match counts, and scores.}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: Analyze a local CSV or TSV file.
    parameters:
      path: {type: string, description: Table path relative to data root.}
      max_rows_preview: {type: integer, description: Number of preview rows.}
      describe: {type: boolean, description: Whether to calculate numeric statistics.}
    required: [path]
    returns:
      num_rows: {type: integer, description: Data row count.}
      num_columns: {type: integer, description: Column count.}
      columns: {type: array, description: Column names.}
      preview: {type: array, description: First rows.}
      describe: {type: object, description: Numeric statistics by column.}

  format_converter:
    module: skills.format_converter
    function: format_converter
    description: Convert text to markdown bullets or formatted JSON and write the converted content to a file.
    parameters:
      text: {type: string, description: Input text.}
      target_format: {type: string, description: markdown or json.}
      output_filename: {type: string, description: Optional output filename. Defaults to converted.md or converted.json.}
    required: [text, target_format]
    returns:
      formatted_text: {type: string, description: Converted text.}
      generated_file_path: {type: string, description: Path of the generated output file.}


  read_convert_file:
    module: skills.read_convert_file
    function: read_convert_file
    description: Composite skill that reads a local UTF-8 txt or md file and converts the content to markdown bullets or formatted JSON.
    parameters:
      path: {type: string, description: File path relative to data root.}
      target_format: {type: string, description: markdown or json.}
      max_chars: {type: integer, description: Maximum characters to read before conversion, up to 8000.}
      output_filename: {type: string, description: Optional converted output filename.}
    required: [path, target_format]
    returns:
      source: {type: string, description: Normalized source path relative to data root.}
      read: {type: object, description: Read stage metadata including returned character count and truncation flag.}
      conversion: {type: object, description: Format converter output including formatted text and generated file path.}

  code_executor:
    module: skills.code_executor
    function: code_executor
    description: Execute restricted Python for loops, functions, prime numbers, sequences, combinatorics, statistics, algorithms, and multi-step calculations. Put the value to return in the final expression.
    parameters:
      code:
        type: string
        description: Python code to run. The final expression is returned as result.
      timeout_seconds:
        type: integer
        description: Timeout in seconds, between 1 and 10.
      allowed_imports:
        type: array
        items: {type: string}
        description: Optional import whitelist selected from math, statistics, json, re, collections, itertools, functools, datetime, decimal, fractions, random.
      work_dir:
        type: string
        description: Sandbox working directory relative to data root. Defaults to sandbox.
    required: [code]
    returns:
      stdout: {type: string, description: Captured standard output.}
      stderr: {type: string, description: Captured standard error.}
      result: {type: object, description: JSON-serializable value of the final expression, or a string representation.}
      sandbox: {type: object, description: Sandbox policy and working directory metadata.}
